<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>taskboard</title>
<style>
  :root { color-scheme: dark; }
  body { font: 14px/1.5 -apple-system, sans-serif; background: #14161a; color: #dde2e8; margin: 0; }
  .topbar { position: sticky; top: 0; z-index: 5; }
  header { display: flex; align-items: center; gap: 12px; padding: 10px 20px; background: #1c1f26; border-bottom: 1px solid #2c313a; }
  h1 { font-size: 16px; margin: 0; flex: 1; }
  nav#groupbar { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; padding: 8px 20px; background: #15181d; border-bottom: 1px solid #2c313a; }
  nav#tabbar { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; padding: 8px 20px; background: #181b21; border-bottom: 1px solid #2c313a; }
  main { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; align-items: start; }
  main.with-stream { grid-template-columns: 1fr 1fr 1fr; }
  @media (max-width: 900px) { main, main.with-stream { grid-template-columns: 1fr; } }
  /* min-width:0 keeps a wide child (e.g. a long cwd) from stretching the grid track past the viewport. */
  main > section { min-width: 0; }
  #stream-col { border-left: 1px solid #2c313a; padding-left: 20px; }
  #stream-events { max-height: 82vh; overflow-y: auto; overflow-x: hidden; }
  @media (max-width: 900px) { #stream-col { border-left: none; padding-left: 0; border-top: 1px solid #2c313a; padding-top: 16px; } }
  h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .08em; color: #8b95a5; margin: 0 0 10px; }
  button { background: #2c313a; color: #dde2e8; border: 1px solid #3c424e; border-radius: 5px; padding: 3px 10px; cursor: pointer; font-size: 12px; }
  button:hover { background: #3c424e; }
  .tab { display: inline-flex; align-items: center; gap: 6px; }
  .tab.active { background: #2d4a6b; border-color: #3a5a82; }
  .tab-badge { background: #e05555; color: #fff; border-radius: 9px; padding: 0 6px; font-size: 10px; font-weight: 600; min-width: 14px; text-align: center; }
  .tab-elapsed { color: #8b95a5; font-size: 10px; }
  .tab-close { color: #8b95a5; font-weight: 700; padding: 0 3px; border-radius: 3px; line-height: 1; }
  .tab-close:hover { background: #e05555; color: #fff; }
  .tab-group { color: #6b7280; padding: 0 3px; border-radius: 3px; line-height: 1; }
  .tab-group:hover { background: #3c424e; color: #fff; }
  .tab-group.grouped { color: #b39ddb; }
  .tab-goto, .tab-loc { color: #6b7280; padding: 0 3px; border-radius: 3px; line-height: 1; }
  .tab-goto:hover, .tab-loc:hover { background: #3c424e; color: #fff; }
  .tab-goto { color: #8b95a5; }
  .tab-loc.set { color: #6fb3d1; }
  .group { display: inline-flex; align-items: center; gap: 6px; }
  .group.active { background: #4a3a6b; border-color: #5a4a82; }
  details { background: #1c1f26; border: 1px solid #2c313a; border-radius: 6px; margin-bottom: 8px; }
  summary { padding: 8px 12px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
  summary code { flex: 1; }
  pre { margin: 0; padding: 12px; border-top: 1px solid #2c313a; white-space: pre-wrap; word-break: break-word; font-size: 12.5px; color: #b9c2cf; max-height: 50vh; overflow: auto; }
  .editor { width: 100%; min-height: 300px; background: #0e1014; color: #dde2e8; border: 1px solid #3c424e; border-radius: 4px; padding: 10px; font: 12.5px/1.5 monospace; box-sizing: border-box; resize: vertical; }
  .event { background: #1c1f26; border: 1px solid #2c313a; border-radius: 6px; padding: 10px 12px; margin-bottom: 8px; }
  .event .top { display: flex; gap: 8px; align-items: baseline; }
  .event .type { font-size: 11px; padding: 1px 7px; border-radius: 9px; background: #2d4a6b; }
  .event .time { color: #717c8d; font-size: 12px; margin-left: auto; }
  .event .desc { color: #9aa4b4; margin: 4px 0; }
  .event pre { border: none; padding: 6px 0 0; max-height: 160px; }
  .event.read { opacity: .55; }
  .event { overflow-wrap: anywhere; }
  .meta { display: flex; flex-wrap: wrap; gap: 4px 12px; font-size: 12px; color: #8b95a5; }
  .event .meta { margin-top: 5px; }
  .meta .mi { white-space: nowrap; min-width: 0; }
  /* cwd can be long: let it scroll within its container rather than widen it. */
  .meta .mi.cwd { overflow-x: auto; max-width: 100%; }
  /* tab/group stand out as colored pills so grouping reads at a glance. */
  .meta .mi.tab, .meta .mi.group { padding: 1px 9px; border-radius: 9px; font-weight: 600; }
  .meta .mi.tab { background: #2d4a6b; color: #d3e3f7; }
  .meta .mi.group { background: #4a3a6b; color: #e7dbf7; }
  .event .actions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .event .actions button { min-width: 68px; text-align: center; white-space: nowrap; }
  .event details.raw { background: none; border: none; border-radius: 0; margin: 5px 0 0; }
  .event details.raw > summary { padding: 0; color: #717c8d; font-size: 11px; }
  .event details.raw pre { border: none; padding: 4px 0 0; }
  /* pane modal (own layer, above the columns) */
  #pane-modal { position: fixed; inset: 0; z-index: 30; background: rgba(0,0,0,.6); display: flex; align-items: center; justify-content: center; padding: 24px; }
  #pane-modal[hidden] { display: none; }
  .pane-dialog { display: flex; flex-direction: column; gap: 10px; width: min(1000px, 95vw); max-height: 90vh; background: #1c1f26; border: 1px solid #3c424e; border-radius: 8px; padding: 14px 16px; box-shadow: 0 12px 40px rgba(0,0,0,.6); }
  .pane-dialog-head { display: flex; align-items: center; gap: 10px; }
  .pane-dialog-head strong { font-size: 14px; }
  .pane-dialog-head #pane-status { flex: 1; font-size: 11px; }
  .pane-cap { margin: 0; padding: 10px; background: #0e1014; border: 1px solid #2c313a; border-radius: 4px; flex: 1; overflow: auto; white-space: pre; font: 12px/1.45 monospace; color: #cdd6e0; }
  .pane-keys { display: flex; flex-wrap: wrap; gap: 6px; }
  .send-row { display: flex; gap: 6px; }
  .send-row input { flex: 1; min-width: 0; background: #0e1014; color: #dde2e8; border: 1px solid #3c424e; border-radius: 4px; padding: 5px 10px; font: 13px monospace; }
  details.ack-fold { background: none; border: none; margin-top: 6px; }
  details.ack-fold > summary { padding: 6px 0; color: #8b95a5; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; }
  .read-bar { display: flex; align-items: center; gap: 8px; color: #e05555; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; margin: 10px 0; }
  .read-bar::before, .read-bar::after { content: ''; flex: 1; border-top: 2px solid #e05555; }
  .worker { display: inline-flex; gap: 8px; align-items: center; background: #1c2b22; border: 1px solid #2f4a3a; border-radius: 6px; padding: 5px 10px; margin: 0 8px 8px 0; }
  .move-pop { position: absolute; z-index: 20; max-width: 260px; background: #1c1f26; border: 1px solid #3c424e; border-radius: 6px; padding: 8px; display: flex; flex-direction: column; gap: 6px; box-shadow: 0 6px 20px rgba(0,0,0,.5); }
  .move-pop .move-tabs { display: flex; flex-wrap: wrap; gap: 6px; }
  .move-pop .move-row { display: flex; gap: 6px; }
  .move-pop input { flex: 1; min-width: 0; background: #0e1014; color: #dde2e8; border: 1px solid #3c424e; border-radius: 4px; padding: 3px 8px; font: 12px sans-serif; }
  #toasts { position: fixed; bottom: 16px; right: 16px; z-index: 10; }
  .toast { background: #2d4a6b; padding: 10px 14px; border-radius: 6px; margin-top: 8px; box-shadow: 0 4px 14px rgba(0,0,0,.4); }
  .muted { color: #717c8d; }
</style>
</head>
<body>
<div class="topbar">
  <header>
    <h1>taskboard</h1>
    <span id="conn" class="muted">connecting…</span>
    <button id="stream-btn" onclick="toggleStream()">stream</button>
    <button id="notif-btn" onclick="Notification.requestPermission().then(setupNotifBtn)">enable notifications</button>
  </header>
  <nav id="groupbar"></nav>
  <nav id="tabbar"></nav>
</div>
<main>
  <section>
    <h2>Task files</h2>
    <div id="files" class="muted">loading…</div>
  </section>
  <section>
    <h2>Active workers</h2>
    <div id="workers" class="muted">none</div>
    <h2 style="margin-top:20px">Worker events</h2>
    <div id="events" class="muted">none</div>
  </section>
  <section id="stream-col" hidden>
    <h2>Event stream <span class="muted" style="text-transform:none;letter-spacing:0">(all events, arrival order)</span></h2>
    <div id="stream-events" class="muted">none</div>
  </section>
</main>
<div id="pane-modal" hidden onclick="if (event.target === this) closePaneModal()">
  <div class="pane-dialog">
    <div class="pane-dialog-head">
      <strong id="pane-title">pane</strong>
      <span id="pane-status" class="muted"></span>
      <button onclick="refreshPaneModal()">refresh</button>
      <button onclick="closePaneModal()">close</button>
    </div>
    <div id="pane-info" class="meta"></div>
    <pre id="pane-cap" class="pane-cap">…</pre>
    <div class="pane-keys">
      <button onclick="paneSend({key:'Enter'})" title="Enter">⏎ Enter</button>
      <button onclick="paneSend({key:'Escape'})">Esc</button>
      <button onclick="paneSend({key:'Up'})">↑</button>
      <button onclick="paneSend({key:'Down'})">↓</button>
      <button onclick="paneSend({key:'C-c'})">Ctrl-C</button>
    </div>
    <div class="send-row">
      <input id="pane-input" placeholder="type text — Enter to run, or 'send' to type without running"
             onkeydown="if (event.key==='Enter'){event.preventDefault(); paneSendText(true);}">
      <button onclick="paneSendText(false)">send</button>
    </div>
  </div>
</div>
<div id="toasts"></div>
<script>
const $ = id => document.getElementById(id);
const esc = s => { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; };

// Short "time since" label, e.g. "8s", "5m", "34h", "2d".
function elapsed(date) {
  const s = Math.max(0, Math.floor((Date.now() - date.getTime()) / 1000));
  if (s < 60) return s + 's';
  const m = Math.floor(s / 60); if (m < 60) return m + 'm';
  const h = Math.floor(m / 60); if (h < 24) return h + 'h';
  return Math.floor(h / 24) + 'd';
}
function arrEq(a, b) { return a.length === b.length && a.every((v, i) => v === b[i]); }

// ---- tab state (localStorage) ----
// taskboard_tabs:      { [tabName]: { files: string[], workers: string[] } }
// taskboard_tab_reads: { "__home__": lastReadId, [tabName]: lastReadId }
// taskboard_tab_groups:{ [groupName]: string[] }  -- second level: groups of tabs
const TABS_KEY = 'taskboard_tabs', READS_KEY = 'taskboard_tab_reads', HOME = '__home__';
const GROUPS_KEY = 'taskboard_tab_groups', ALL = '__all__';
// Optional tmux "goto" location per tab (a goto target, name-@N-%N).
const LOCS_KEY = 'taskboard_tab_locs';
const gotoTargetRe = /^[A-Za-z0-9._-]*@[0-9]+-%[0-9]+$/;
// The unified event stream is its own read scope (see renderStream); unlike
// tabs it tracks per-event acknowledgment rather than a cumulative marker.
const STREAM = '__stream__', STREAM_OPEN_KEY = 'taskboard_stream_open';
const ACKED_KEY = 'taskboard_stream_acked';
let streamFloor = null;  // events with id <= this predate the page load and are hidden

function loadTabState() { try { return JSON.parse(localStorage.getItem(TABS_KEY)) || {}; } catch { return {}; } }
function saveTabState(s) { localStorage.setItem(TABS_KEY, JSON.stringify(s)); }
function loadReads() { try { return JSON.parse(localStorage.getItem(READS_KEY)) || {}; } catch { return {}; } }
function saveReads(r) { localStorage.setItem(READS_KEY, JSON.stringify(r)); }
function loadGroups() { try { return JSON.parse(localStorage.getItem(GROUPS_KEY)) || {}; } catch { return {}; } }
function saveGroups(g) { localStorage.setItem(GROUPS_KEY, JSON.stringify(g)); }

// The group a tab belongs to, or null if ungrouped.
function getGroupForTab(tabName) {
  for (const [g, tabs] of Object.entries(loadGroups())) if (tabs.includes(tabName)) return g;
  return null;
}

// assignTabToGroup moves a tab into a group; groupName === ALL (or empty) unassigns
// it. A tab lives in at most one group. Groups left empty are pruned.
function assignTabToGroup(groupName, tabName) {
  const g = loadGroups();
  for (const tabs of Object.values(g)) { const i = tabs.indexOf(tabName); if (i >= 0) tabs.splice(i, 1); }
  if (groupName && groupName !== ALL) {
    const tabs = g[groupName] || (g[groupName] = []);
    if (!tabs.includes(tabName)) tabs.push(tabName);
  }
  for (const [n, tabs] of Object.entries(g)) if (!tabs.length) delete g[n];
  saveGroups(g);
}

// Per-tab tmux goto location (name-@N-%N), independent of any worker.
function loadLocs() { try { return JSON.parse(localStorage.getItem(LOCS_KEY)) || {}; } catch { return {}; } }
function saveLocs(l) { localStorage.setItem(LOCS_KEY, JSON.stringify(l)); }
function getTabLoc(name) { return loadLocs()[name] || ''; }
function setTabLoc(name, loc) { const l = loadLocs(); if (loc) l[name] = loc; else delete l[name]; saveLocs(l); }
// Drop locations for tabs that no longer exist.
function pruneLocs() {
  const tabs = loadTabState(), l = loadLocs();
  let changed = false;
  for (const name of Object.keys(l)) if (!tabs[name]) { delete l[name]; changed = true; }
  if (changed) saveLocs(l);
}

// pruneGroups drops references to tabs that no longer exist and any group left
// empty, so closing/pruning a tab can't leave a stale group behind.
function pruneGroups() {
  const tabs = loadTabState(), g = loadGroups();
  let changed = false;
  for (const [name, list] of Object.entries(g)) {
    const kept = list.filter(t => tabs[t]);
    if (kept.length !== list.length) { g[name] = kept; changed = true; }
    if (!kept.length) { delete g[name]; changed = true; }
  }
  if (changed) saveGroups(g);
}

function getTabForFile(path) {
  for (const [n, t] of Object.entries(loadTabState())) if (t.files?.includes(path)) return n;
  return null;
}
function getTabForWorker(key) {
  for (const [n, t] of Object.entries(loadTabState())) if (t.workers?.includes(key)) return n;
  return null;
}

// assignToTab moves an item to a named tab; tabName === HOME (or empty) just
// unassigns it. Tabs left with no items are pruned along with their read marker.
function assignToTab(tabName, type, id) {
  const state = loadTabState(), reads = loadReads(), field = type === 'file' ? 'files' : 'workers';
  for (const t of Object.values(state)) {
    if (t[field]) { const i = t[field].indexOf(id); if (i >= 0) t[field].splice(i, 1); }
  }
  if (tabName && tabName !== HOME) {
    const t = state[tabName] || (state[tabName] = { files: [], workers: [] });
    if (!t[field].includes(id)) t[field].push(id);
  }
  for (const [n, t] of Object.entries(state)) {
    if (!(t.files?.length) && !(t.workers?.length)) { delete state[n]; delete reads[n]; }
  }
  saveTabState(state); saveReads(reads);
}

function getTabRead(tabName) { return loadReads()[tabName] || 0; }
function setTabRead(tabName, id) {
  const reads = loadReads(); reads[tabName] = id; saveReads(reads);
  // Home mirrors to the server marker for backward compat with read.txt.
  if (tabName === HOME)
    fetch('/api/read', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ id }) }).catch(() => {});
}

// True if the given item belongs to tabName (HOME = unassigned).
function tabFilter(tabName, type, id) {
  const a = type === 'file' ? getTabForFile(id) : getTabForWorker(id);
  return tabName === HOME ? a === null : a === tabName;
}

// ---- caches + current tab ----
let allFiles = [], allWorkers = [], allEvents = [];
let renderedFilePaths = [];
let currentTab = HOME;
let currentGroup = ALL;  // which group's tabs the tab bar is filtered to (ALL = every tab)

// A worker's identity: session_id first (matches the server's worker key),
// pane_loc as fallback.
function keyOf(meta) { try { return meta?.session_id || meta?.pane_loc || null; } catch { return null; } }

function filesForTab(tabName) { return allFiles.filter(f => tabFilter(tabName, 'file', f.path)); }
function workersForTab(tabName) { return allWorkers.filter(w => tabFilter(tabName, 'worker', w.key)); }

// Most-recent event per worker key, filtered to a tab; newest first.
function eventsForTab(tabName) {
  const seen = new Set(), out = [];
  for (const e of [...allEvents].reverse()) {
    const k = keyOf(e.metadata);
    if (!k || seen.has(k)) continue;
    seen.add(k);
    if (tabFilter(tabName, 'worker', k)) out.push(e);
  }
  return out;
}
function tabUnread(tabName) { const r = getTabRead(tabName); return eventsForTab(tabName).filter(e => e.id > r).length; }
function tabLastTime(tabName) { const ev = eventsForTab(tabName); return ev.length ? new Date(ev[0].time) : null; }

// Most-recent activity in a tab: latest event time or, failing that, newest file
// mtime. Drives both the tab ordering and the elapsed-time label.
function tabActivity(tabName) {
  let t = 0;
  const lt = tabLastTime(tabName); if (lt) t = lt.getTime();
  for (const f of filesForTab(tabName)) if (f.mtime) t = Math.max(t, new Date(f.mtime).getTime());
  return t;
}
// Named tabs ordered most-recent first; ties broken by name.
function orderedTabNames() {
  return Object.keys(loadTabState()).sort((a, b) => tabActivity(b) - tabActivity(a) || a.localeCompare(b));
}

// A group's activity/unread aggregate over its member tabs.
function groupActivity(g) { return (loadGroups()[g] || []).reduce((m, t) => Math.max(m, tabActivity(t)), 0); }
function groupUnread(g) { return (loadGroups()[g] || []).reduce((s, t) => s + tabUnread(t), 0); }
// Groups ordered most-recent first; ties broken by name.
function orderedGroupNames() {
  return Object.keys(loadGroups()).sort((a, b) => groupActivity(b) - groupActivity(a) || a.localeCompare(b));
}
// Named tabs visible under the current group (ALL = every tab). Home is always
// shown by renderTabs and is not part of any group.
function tabsInCurrentGroup() {
  const all = orderedTabNames();
  if (currentGroup === ALL) return all;
  const set = new Set(loadGroups()[currentGroup] || []);
  return all.filter(n => set.has(n));
}

// ---- group bar (second level: groups of tabs) ----
function renderGroups() {
  pruneGroups();
  const bar = $('groupbar');
  if (currentGroup !== ALL && !loadGroups()[currentGroup]) currentGroup = ALL;
  const names = orderedGroupNames();
  // No groups defined → hide the bar entirely; the tab bar behaves as before.
  if (!names.length) { bar.innerHTML = ''; bar.style.display = 'none'; return; }
  bar.style.display = '';
  bar.innerHTML = '';
  for (const name of [ALL, ...names]) {
    const btn = document.createElement('button');
    btn.className = 'group' + (name === currentGroup ? ' active' : '');
    const unread = name === ALL ? 0 : groupUnread(name);
    btn.innerHTML = `<span>${name === ALL ? 'All' : esc(name)}</span>`
      + (unread ? `<span class="tab-badge">${unread}</span>` : '');
    btn.onclick = () => switchGroup(name);
    if (name !== ALL) {
      const x = document.createElement('span');
      x.className = 'tab-close';
      x.textContent = '×';
      x.title = 'delete group (its tabs become ungrouped)';
      x.onclick = e => { e.stopPropagation(); deleteGroup(name); };
      btn.appendChild(x);
    }
    bar.appendChild(btn);
  }
}
// Switching group filters the tab bar; if the active tab isn't in the new group,
// fall back to Home (which is never grouped).
function switchGroup(name) {
  currentGroup = name;
  if (currentTab !== HOME && !tabsInCurrentGroup().includes(currentTab)) currentTab = HOME;
  renderAll();
}
function deleteGroup(name) {
  const g = loadGroups(); delete g[name]; saveGroups(g);
  if (currentGroup === name) currentGroup = ALL;
  renderAll();
}

// ---- tab bar ----
function renderTabs() {
  renderGroups();  // keep the group bar (and its unread badges) in sync
  pruneLocs();
  const names = [HOME, ...tabsInCurrentGroup()];
  const bar = $('tabbar');
  bar.innerHTML = '';
  for (const name of names) {
    const btn = document.createElement('button');
    btn.className = 'tab' + (name === currentTab ? ' active' : '');
    const unread = tabUnread(name), last = tabLastTime(name);
    btn.innerHTML = `<span>${name === HOME ? 'Home' : esc(name)}</span>`
      + (unread ? `<span class="tab-badge">${unread}</span>` : '')
      + (last ? `<span class="tab-elapsed">${elapsed(last)}</span>` : '');
    btn.onclick = () => switchTab(name);
    if (name !== HOME) {
      // One-click tmux goto, shown only when the tab has a saved location.
      const loc = getTabLoc(name);
      if (loc) {
        const go = document.createElement('span');
        go.className = 'tab-goto';
        go.textContent = '⇥';
        go.title = 'go to ' + loc;
        go.onclick = e => { e.stopPropagation(); gotoPane(loc); };
        btn.appendChild(go);
      }
      // Set/edit/clear the tab's tmux location.
      const pin = document.createElement('span');
      pin.className = 'tab-loc' + (loc ? ' set' : '');
      pin.textContent = '⌖';
      pin.title = loc ? 'edit tmux location' : 'set a tmux location for quick goto';
      pin.onclick = e => { e.stopPropagation(); promptLoc(name, pin); };
      btn.appendChild(pin);
      // Assign this tab to a group; the icon fills in when it belongs to one.
      const group = getGroupForTab(name);
      const grp = document.createElement('span');
      grp.className = 'tab-group' + (group ? ' grouped' : '');
      grp.textContent = group ? '◈' : '◇';
      grp.title = group ? `in group "${group}" — reassign` : 'assign tab to a group';
      grp.onclick = e => { e.stopPropagation(); promptGroup(name, grp); };
      btn.appendChild(grp);
      // Closing a tab (×) returns its files/workers/events to Home.
      const x = document.createElement('span');
      x.className = 'tab-close';
      x.textContent = '×';
      x.title = 'close tab (items return to Home)';
      x.onclick = e => { e.stopPropagation(); closeTab(name); };
      btn.appendChild(x);
    }
    bar.appendChild(btn);
  }
  updateFavicon();
}
function switchTab(name) { currentTab = name; renderAll(); }

// ---- favicon (unread indicator) ----
// Total unread across Home + all tabs; drives the favicon's unread dot.
function totalUnread() {
  return orderedTabNames().reduce((n, name) => n + tabUnread(name), tabUnread(HOME));
}

let faviconUnread = null;  // last rendered state, to avoid needless redraws
function updateFavicon() {
  const unread = totalUnread() > 0;
  if (unread === faviconUnread) return;
  faviconUnread = unread;
  const c = document.createElement('canvas');
  c.width = c.height = 32;
  const x = c.getContext('2d');
  x.fillStyle = '#2d4a6b';
  if (x.roundRect) { x.beginPath(); x.roundRect(2, 2, 28, 28, 7); x.fill(); }
  else x.fillRect(2, 2, 28, 28);
  x.fillStyle = '#dde2e8';
  x.font = 'bold 20px -apple-system, sans-serif';
  x.textAlign = 'center'; x.textBaseline = 'middle';
  x.fillText('T', 16, 18);
  if (unread) {  // red dot in the corner
    x.fillStyle = '#e05555';
    x.beginPath(); x.arc(25, 7, 6, 0, 2 * Math.PI); x.fill();
  }
  let link = document.querySelector('link[rel="icon"]');
  if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
  link.href = c.toDataURL('image/png');
}

// focusTab switches to a tab and, if needed, reveals it by adjusting the group
// filter (used to jump from a stream event to its worker's tab). Home is never
// grouped, so it's always reachable.
function focusTab(name) {
  currentTab = name;
  if (name !== HOME) {
    const g = getGroupForTab(name);
    if (g) currentGroup = g;
    else if (!tabsInCurrentGroup().includes(name)) currentGroup = ALL;
  }
  renderAll();
}

// closeTab forgets a tab and its read marker. Its files/workers are no longer
// claimed by any tab, so they (and their events) fall back to Home.
function closeTab(name) {
  if (name === HOME) return;
  const state = loadTabState(), reads = loadReads();
  delete state[name]; delete reads[name];
  saveTabState(state); saveReads(reads);
  setTabLoc(name, '');
  if (currentTab === name) currentTab = HOME;
  renderAll();
}
function renderAll() { renderTabs(); renderFiles(); renderWorkers(); renderEvents(); }

// ---- files ----
const urlRe = /https?:\/\/[^\s<>"&]+/g;
function renderContent(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    .replace(urlRe, u => `<a href="${u}" target="_blank" rel="noopener">${u}</a>`);
}
async function fetchFileContent(encPath) {
  const r = await fetch('/api/file?path=' + encPath);
  if (!r.ok) throw new Error(await r.text());
  return (await r.json()).content;
}

function renderFiles() {
  const files = filesForTab(currentTab);
  renderedFilePaths = files.map(f => f.path);
  const host = $('files');
  host.innerHTML = files.length ? '' : '<span class="muted">no matching files</span>';
  for (const f of files) {
    const encPath = encodeURIComponent(f.path);
    const d = document.createElement('details');
    d.dataset.encpath = encPath;
    d.innerHTML = `<summary><code>${esc(f.path)}</code></summary><pre>…</pre>`;
    const summary = d.querySelector('summary');
    const editBtn = document.createElement('button');
    editBtn.textContent = 'edit';
    editBtn.onclick = e => { e.preventDefault(); editFile(d, encPath); };
    const mvBtn = document.createElement('button');
    mvBtn.textContent = 'tab ▾';
    mvBtn.onclick = e => { e.preventDefault(); promptMove('file', f.path, mvBtn); };
    summary.append(editBtn, mvBtn);
    d.addEventListener('toggle', () => { if (d.open) loadFile(d, encPath); }, { once: true });
    host.appendChild(d);
    // Dedicated task tabs usually hold one file — expand it by default.
    if (currentTab !== HOME) d.open = true;
  }
}

async function loadFile(details, encPath) {
  const pre = details.querySelector('pre');
  if (!pre) return;  // being edited
  const scroll = pre.scrollTop;
  try {
    const content = await fetchFileContent(encPath);
    pre.innerHTML = renderContent(content);
    pre.scrollTop = scroll;
    details.dataset.content = content;
  } catch(e) { pre.textContent = 'error: ' + e.message; }
}

// Refresh content of any open (non-editing) file panes in place.
function refreshOpenFiles() {
  for (const d of $('files').querySelectorAll('details[open]')) loadFile(d, d.dataset.encpath);
}

async function editFile(details, encPath) {
  let content = details.dataset.content;
  if (content === undefined) {
    try { content = await fetchFileContent(encPath); details.dataset.content = content; }
    catch(e) { alert('load error: ' + e.message); return; }
  }
  details.open = true;
  const pre = details.querySelector('pre');
  if (!pre) return;  // already editing
  const ta = document.createElement('textarea');
  ta.value = content;
  ta.className = 'editor';
  pre.replaceWith(ta);
  const saveBtn = document.createElement('button'); saveBtn.textContent = 'save';
  const cancelBtn = document.createElement('button'); cancelBtn.textContent = 'cancel';
  details.querySelector('summary').append(saveBtn, cancelBtn);
  const finish = text => {
    const newPre = document.createElement('pre');
    newPre.innerHTML = renderContent(text);
    ta.replaceWith(newPre);
    saveBtn.remove(); cancelBtn.remove();
  };
  cancelBtn.onclick = e => { e.preventDefault(); finish(details.dataset.content ?? ''); };
  saveBtn.onclick = async e => {
    e.preventDefault();
    const r = await fetch('/api/file?path=' + encPath, {
      method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ content: ta.value })
    });
    if (!r.ok) { alert('save failed: ' + await r.text()); return; }
    details.dataset.content = ta.value;
    finish(ta.value);
  };
}

async function loadFiles() {
  try { allFiles = await fetch('/api/files').then(r => r.json()) || []; } catch { return; }
  const want = filesForTab(currentTab).map(f => f.path);
  if (!arrEq(want, renderedFilePaths)) renderFiles();
  else refreshOpenFiles();
}

// ---- workers ----
function renderWorkers() {
  const workers = workersForTab(currentTab);
  $('workers').innerHTML = workers.length ? '' : '<span class="muted">none</span>';
  for (const w of workers) {
    const d = document.createElement('span');
    d.className = 'worker';
    d.innerHTML = `<strong>${esc(w.title || w.key)}</strong>
      <span class="muted">${esc(w.last_event_type)}</span>
      ${w.pane_loc ? `<button onclick="gotoPane('${esc(w.pane_loc)}')">goto</button>` : ''}`;
    const mv = document.createElement('button');
    mv.textContent = 'tab ▾';
    mv.onclick = e => { e.preventDefault(); promptMove('worker', w.key, mv); };
    d.appendChild(mv);
    const forget = document.createElement('button');
    forget.textContent = 'forget';
    forget.title = 'remove this worker from the active list';
    forget.onclick = e => { e.preventDefault(); forgetWorker(w.key); };
    d.appendChild(forget);
    $('workers').appendChild(d);
  }
}

async function forgetWorker(key) {
  if (!confirm('Forget this worker? It will reappear if it sends another event.')) return;
  const r = await fetch('/api/workers', {
    method: 'DELETE', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ key })
  });
  if (!r.ok) { toast('forget failed: ' + await r.text()); return; }
  loadWorkers();
}

// ---- events ----
// Events render under a "scope": a tab name for the per-tab queue, or STREAM
// for the unified stream. Tabs use a cumulative read marker; the stream tracks
// per-event acknowledgment. Neither ever affects the other.
function isEventRead(e, scope) { return scope === STREAM ? isAcked(e.id) : e.id <= getTabRead(scope); }

// Collapse a leading $HOME (macOS /Users/x or Linux /home/x) to ~ for display.
function abbrevPath(p) { return p ? p.replace(/^\/(?:Users|home)\/[^/]+/, '~') : ''; }

// Readonly info chips for an event: pane, cwd, and — when includeTab — the
// worker's tab and group. Returns an array of HTML strings.
function eventChips(e, includeTab) {
  const md = e.metadata || {};
  const k = keyOf(e.metadata);
  const chips = [];
  if (md.pane_loc) chips.push(`<span class="mi" title="tmux pane">⧉ ${esc(md.pane_loc)}</span>`);
  if (md.cwd) chips.push(`<span class="mi cwd" title="${esc(md.cwd)}">${esc(abbrevPath(md.cwd))}</span>`);
  if (includeTab && k) {
    const dest = getTabForWorker(k);
    chips.push(`<span class="mi tab" title="tab">▤ ${esc(dest || 'Home')}</span>`);
    const grp = dest ? getGroupForTab(dest) : null;
    if (grp) chips.push(`<span class="mi group" title="group">▣ ${esc(grp)}</span>`);
  }
  return chips;
}

function renderEvent(e, scope) {
  const isRead = isEventRead(e, scope);
  const div = document.createElement('div');
  div.className = 'event' + (isRead ? ' read' : '');
  const md = e.metadata || {};
  const pl = md.pane_loc || '';
  const k = keyOf(e.metadata);

  // Readonly info chips keep the action labels short; the worker's tab/group
  // only add value in the stream. Full metadata stays behind "raw".
  const chips = eventChips(e, scope === STREAM);

  div.innerHTML = `<div class="top"><span class="type">${esc(e.event_type)}</span>
      <strong>${esc(e.title)}</strong>
      <span class="time">${new Date(e.time).toLocaleTimeString()}</span></div>
    ${e.description ? `<div class="desc">${esc(e.description)}</div>` : ''}
    ${chips.length ? `<div class="meta">${chips.join('')}</div>` : ''}`;

  // Actions live in their own uniform row rather than inline in the header.
  const actions = document.createElement('div');
  actions.className = 'actions';
  const add = (text, title, onclick) => {
    const b = document.createElement('button');
    b.textContent = text; if (title) b.title = title; b.onclick = onclick;
    actions.appendChild(b);
    return b;
  };
  const paneId = (pl.match(/%\d+/) || [])[0];
  if (pl) add('goto', `switch tmux to ${pl}`, () => gotoPane(pl, e.id, scope));
  if (paneId) add('pane', 'open this pane (view + send keys)', () => openPaneModal(paneId, e));
  if (scope === STREAM) {
    // Acknowledge this one event (move it below the fold), independent of others.
    add(isRead ? 'un-ack' : 'ack',
        isRead ? 'move back to unacknowledged' : 'acknowledge (move below the fold)',
        () => { isRead ? unackEvent(e.id) : ackEvent(e.id); renderStream(); updateStreamBtn(); });
  } else {
    add(isRead ? 'unread' : 'mark read',
        isRead ? 'mark this and newer events unread' : 'mark this and older events read',
        () => applyRead(scope, isRead ? e.id - 1 : e.id));
  }
  if (k) {
    // From the stream, jump to the worker's tab (its per-tab queue lives there).
    if (scope === STREAM) {
      const dest = getTabForWorker(k) || HOME;
      add('focus', "switch to this worker's tab", () => focusTab(dest));
    }
    const mv = add('tab ▾', 'assign this worker to a tab', ev => { ev.preventDefault(); promptMove('worker', k, mv); });
  }
  div.appendChild(actions);

  if (e.metadata) {
    const raw = document.createElement('details');
    raw.className = 'raw';
    raw.innerHTML = `<summary>raw</summary><pre>${esc(JSON.stringify(e.metadata, null, 2))}</pre>`;
    div.appendChild(raw);
  }
  return div;
}

// ---- pane modal ----
// The tmux tunnel opens in a modal on its own layer (the pane is usually wider
// and taller than an event card), auto-refreshing its capture while open.
let paneModal = { id: null, timer: null };

function openPaneModal(paneId, e) {
  paneModal.id = paneId;
  $('pane-title').textContent = 'pane ' + paneId;
  $('pane-status').textContent = '';
  $('pane-info').innerHTML = eventChips(e, true).join('');  // context hidden behind the modal
  $('pane-input').value = '';
  $('pane-modal').hidden = false;
  refreshPaneModal();
  clearInterval(paneModal.timer);
  paneModal.timer = setInterval(refreshPaneModal, 1500);  // keep the view live
  $('pane-input').focus();
}

function closePaneModal() {
  clearInterval(paneModal.timer);
  paneModal = { id: null, timer: null };
  $('pane-modal').hidden = true;
}

async function refreshPaneModal() {
  if (!paneModal.id) return;
  try {
    $('pane-cap').textContent = (await capturePane(paneModal.id)) || '(empty)';
    $('pane-status').textContent = '';
  } catch (err) { $('pane-status').textContent = 'capture error'; }
}

// send one payload ({text} or {key}) to the open pane, then refresh soon after.
async function paneSend(payload) {
  if (!paneModal.id) return;
  try { await sendPaneKeys({ pane: paneModal.id, ...payload }); }
  catch (err) { toast('send failed: ' + err.message); return; }
  setTimeout(refreshPaneModal, 120);
}

// Send the typed text; with submit=true, follow it with Enter (i.e. run it).
async function paneSendText(submit) {
  const text = $('pane-input').value;
  if (text) await paneSend({ text });
  if (submit) await paneSend({ key: 'Enter' });
  $('pane-input').value = '';
  $('pane-input').focus();
}

function readBar() {
  const d = document.createElement('div');
  d.className = 'read-bar';
  d.textContent = 'read below';
  return d;
}

// renderList paints an event list into host under a read scope, inserting the
// "read below" divider at the first read event.
function renderList(host, events, scope) {
  const read = getTabRead(scope);
  host.innerHTML = events.length ? '' : '<span class="muted">none</span>';
  let barPlaced = false;
  for (const e of events) {
    if (!barPlaced && e.id <= read) { host.appendChild(readBar()); barPlaced = true; }
    host.appendChild(renderEvent(e, scope));
  }
  if (events.length && !barPlaced) host.appendChild(readBar());
}

function renderEvents() { renderList($('events'), eventsForTab(currentTab), currentTab); }

// applyRead moves a tab's cumulative read marker and repaints; also refreshes
// the tab/group bars whose badges track per-tab reads.
function applyRead(scope, id) {
  setTabRead(scope, id);
  renderEvents();
  renderTabs();
}

// ---- unified event stream ----
// A single firehose of every event across all workers, in arrival order
// (newest first), independent of the current tab/group. Toggled into its own
// column; never affects the per-tab queue. Events are acknowledged one at a
// time (not a running marker), since the stream interleaves many workers.
function loadAcked() { try { return new Set(JSON.parse(localStorage.getItem(ACKED_KEY)) || []); } catch { return new Set(); } }
function saveAcked(s) { localStorage.setItem(ACKED_KEY, JSON.stringify([...s])); }
function isAcked(id) { return loadAcked().has(id); }
function ackEvent(id) { const s = loadAcked(); s.add(id); saveAcked(s); }
function unackEvent(id) { const s = loadAcked(); s.delete(id); saveAcked(s); }
// Drop acks for events that have since aged out of the store.
function pruneAcked() {
  const s = loadAcked(), ids = new Set(allEvents.map(e => e.id));
  let changed = false;
  for (const id of s) if (!ids.has(id)) { s.delete(id); changed = true; }
  if (changed) saveAcked(s);
}
// One event per worker (newest first), like the per-tab queue — the global
// stream is too noisy with every event. Keyless events stand on their own.
// An event is "unread" if it sits above its tab's read marker (workers with no
// tab belong to Home).
function eventUnreadInTab(e) {
  const k = keyOf(e.metadata);
  return k ? e.id > getTabRead(getTabForWorker(k) || HOME) : false;
}

function streamDeduped() {
  const seen = new Set(), out = [];
  for (const e of [...allEvents].reverse()) {
    // Show events that arrived since page load, plus anything still unread in
    // its tab — so pre-existing unread work surfaces even on a fresh load.
    if (e.id <= streamFloor && !eventUnreadInTab(e)) continue;
    if (e.event_type === 'session_end') continue;  // worker is gone; not stream-worthy
    const k = keyOf(e.metadata) || 'id:' + e.id;
    if (seen.has(k)) continue;
    seen.add(k);
    out.push(e);
  }
  return out;
}
function streamUnread() { const s = loadAcked(); return streamDeduped().filter(e => !s.has(e.id)).length; }

function renderStream() {
  if (!isStreamOpen()) return;
  pruneAcked();
  const acked = loadAcked();
  const events = streamDeduped();  // newest per worker
  const unacked = events.filter(e => !acked.has(e.id));
  const done = events.filter(e => acked.has(e.id));
  const host = $('stream-events');
  host.innerHTML = '';
  for (const e of unacked) host.appendChild(renderEvent(e, STREAM));
  if (!unacked.length) {
    const m = document.createElement('span'); m.className = 'muted';
    m.textContent = 'nothing unacknowledged'; host.appendChild(m);
  }
  // Acknowledged events collapse into a fold below, retrievable but out of the way.
  if (done.length) {
    const d = document.createElement('details'); d.className = 'ack-fold';
    d.innerHTML = `<summary>acknowledged (${done.length})</summary>`;
    for (const e of done) d.appendChild(renderEvent(e, STREAM));
    host.appendChild(d);
  }
}

function isStreamOpen() { return localStorage.getItem(STREAM_OPEN_KEY) === '1'; }

// Reflect stream open/closed state in the layout and header button; called on
// load and whenever the stream is toggled.
function applyStreamVisibility() {
  const open = isStreamOpen();
  $('stream-col').hidden = !open;
  document.querySelector('main').classList.toggle('with-stream', open);
  updateStreamBtn();
  if (open) renderStream();
}

function updateStreamBtn() {
  const u = streamUnread();
  $('stream-btn').textContent = (isStreamOpen() ? 'hide stream' : 'stream') + (u ? ` (${u})` : '');
}

function toggleStream() {
  localStorage.setItem(STREAM_OPEN_KEY, isStreamOpen() ? '0' : '1');
  applyStreamVisibility();
}

// ---- move popup ----
let closeMovePopup = () => {};
function promptMove(type, id, anchor) {
  closeMovePopup();
  const current = type === 'file' ? getTabForFile(id) : getTabForWorker(id);

  function doMove(target) {
    assignToTab(target, type, id);
    closeMovePopup();
    if (currentTab !== HOME && !loadTabState()[currentTab]) currentTab = HOME;
    renderAll();
  }

  const pop = document.createElement('div');
  pop.className = 'move-pop';

  // Existing tabs as one-click targets (skip the one it's already in).
  const others = orderedTabNames().filter(n => n !== current);
  if (others.length) {
    const list = document.createElement('div'); list.className = 'move-tabs';
    for (const t of others) {
      const b = document.createElement('button'); b.textContent = t;
      b.onclick = () => doMove(t);
      list.appendChild(b);
    }
    pop.appendChild(list);
  }

  // New-tab input (only needed when creating a tab for the first time).
  const row = document.createElement('div'); row.className = 'move-row';
  const input = document.createElement('input'); input.placeholder = 'new tab name';
  const create = document.createElement('button'); create.textContent = 'create';
  create.onclick = () => { const n = input.value.trim(); if (n) doMove(n); };
  row.append(input, create);
  pop.appendChild(row);

  if (current) {
    const home = document.createElement('button'); home.textContent = 'move to Home';
    home.onclick = () => doMove(HOME);
    pop.appendChild(home);
  }
  const cancel = document.createElement('button'); cancel.textContent = 'cancel';
  cancel.onclick = () => closeMovePopup();
  pop.appendChild(cancel);

  showPopup(pop, anchor);
  input.focus();
  input.onkeydown = e => {
    if (e.key === 'Enter') { const n = input.value.trim(); if (n) doMove(n); }
    if (e.key === 'Escape') closeMovePopup();
  };
}

// promptGroup assigns a tab to a group (mirrors promptMove for tabs → groups).
function promptGroup(tabName, anchor) {
  closeMovePopup();
  const current = getGroupForTab(tabName);

  function doAssign(target) {
    assignTabToGroup(target, tabName);
    closeMovePopup();
    if (currentGroup !== ALL && !tabsInCurrentGroup().includes(currentTab)) currentTab = HOME;
    renderAll();
  }

  const pop = document.createElement('div');
  pop.className = 'move-pop';

  const others = orderedGroupNames().filter(n => n !== current);
  if (others.length) {
    const list = document.createElement('div'); list.className = 'move-tabs';
    for (const g of others) {
      const b = document.createElement('button'); b.textContent = g;
      b.onclick = () => doAssign(g);
      list.appendChild(b);
    }
    pop.appendChild(list);
  }

  const row = document.createElement('div'); row.className = 'move-row';
  const input = document.createElement('input'); input.placeholder = 'new group name';
  const create = document.createElement('button'); create.textContent = 'create';
  create.onclick = () => { const n = input.value.trim(); if (n) doAssign(n); };
  row.append(input, create);
  pop.appendChild(row);

  if (current) {
    const rm = document.createElement('button'); rm.textContent = 'remove from group';
    rm.onclick = () => doAssign(ALL);
    pop.appendChild(rm);
  }
  const cancel = document.createElement('button'); cancel.textContent = 'cancel';
  cancel.onclick = () => closeMovePopup();
  pop.appendChild(cancel);

  showPopup(pop, anchor);
  input.focus();
  input.onkeydown = e => {
    if (e.key === 'Enter') { const n = input.value.trim(); if (n) doAssign(n); }
    if (e.key === 'Escape') closeMovePopup();
  };
}

// promptLoc sets/edits/clears a tab's tmux goto location.
function promptLoc(tabName, anchor) {
  closeMovePopup();
  const cur = getTabLoc(tabName);

  const pop = document.createElement('div');
  pop.className = 'move-pop';

  if (cur) {
    const go = document.createElement('button');
    go.textContent = 'goto ' + cur;
    go.onclick = () => { gotoPane(cur); closeMovePopup(); };
    pop.appendChild(go);
  }

  const row = document.createElement('div'); row.className = 'move-row';
  const input = document.createElement('input');
  input.placeholder = 'name-@N-%N'; input.value = cur;
  const save = document.createElement('button'); save.textContent = 'save';
  const doSave = () => {
    const v = input.value.trim();
    if (v && !gotoTargetRe.test(v)) { toast('location must look like name-@N-%N'); return; }
    setTabLoc(tabName, v); closeMovePopup(); renderTabs();
  };
  save.onclick = doSave;
  row.append(input, save);
  pop.appendChild(row);

  if (cur) {
    const clr = document.createElement('button'); clr.textContent = 'clear';
    clr.onclick = () => { setTabLoc(tabName, ''); closeMovePopup(); renderTabs(); };
    pop.appendChild(clr);
  }
  const cancel = document.createElement('button'); cancel.textContent = 'cancel';
  cancel.onclick = () => closeMovePopup();
  pop.appendChild(cancel);

  showPopup(pop, anchor);
  input.focus();
  input.onkeydown = e => { if (e.key === 'Enter') doSave(); if (e.key === 'Escape') closeMovePopup(); };
}

// showPopup appends a popup, positions it below the anchor (clamped on-screen),
// and wires outside-click dismissal via the shared closeMovePopup handle.
function showPopup(pop, anchor) {
  document.body.appendChild(pop);
  const r = anchor.getBoundingClientRect();
  const vw = document.documentElement.clientWidth, vh = document.documentElement.clientHeight;
  let left = r.left, top = r.bottom + 4;
  if (left + pop.offsetWidth > vw - 8) left = Math.max(8, vw - pop.offsetWidth - 8);
  if (top + pop.offsetHeight > vh - 8) top = Math.max(8, r.top - pop.offsetHeight - 4);
  pop.style.left = (window.scrollX + left) + 'px';
  pop.style.top = (window.scrollY + top) + 'px';
  const onDoc = e => { if (!pop.contains(e.target) && e.target !== anchor) closeMovePopup(); };
  setTimeout(() => document.addEventListener('click', onDoc), 0);
  closeMovePopup = () => { document.removeEventListener('click', onDoc); pop.remove(); closeMovePopup = () => {}; };
}

// ---- data fetches ----
let homeSeeded = false;
function seedHomeRead(serverLastRead) {
  if (homeSeeded) return;
  homeSeeded = true;
  const reads = loadReads();
  if (reads[HOME] === undefined) { reads[HOME] = serverLastRead; saveReads(reads); }
}

// The stream only shows events that arrive after the page loads: on first load
// we record the newest id as a floor and ignore anything at or below it, so a
// refresh starts empty and fills only with new activity.
function initStreamFloor() {
  if (streamFloor !== null) return;
  streamFloor = allEvents.reduce((m, e) => Math.max(m, e.id), 0);
}

async function loadEvents() {
  let data;
  try { data = await fetch('/api/events').then(r => r.json()); } catch { return; }
  allEvents = data.events || [];
  initStreamFloor();
  seedHomeRead(data.last_read || 0);
  renderEvents();
  renderStream();
  updateStreamBtn();
  renderTabs();
}
async function loadWorkers() {
  try { allWorkers = await fetch('/api/workers').then(r => r.json()) || []; } catch { return; }
  renderWorkers();
  renderTabs();
}

// ---- tmux pane tunnelling ----
async function capturePane(pane) {
  const r = await fetch('/api/pane/capture', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ pane }) });
  if (!r.ok) throw new Error(await r.text());
  return (await r.json()).content;
}
// payload is {pane, text} for literal text or {pane, key} for a named key.
async function sendPaneKeys(payload) {
  const r = await fetch('/api/pane/keys', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
  if (!r.ok) throw new Error(await r.text());
}

async function gotoPane(target, eventId, scope = currentTab) {
  const r = await fetch('/api/goto', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ target }) });
  toast(r.ok ? 'switched to ' + target : 'goto failed: ' + await r.text());
  // In a tab queue, jumping to the pane advances the read marker; the stream
  // leaves acknowledgment explicit (like focus).
  if (r.ok && eventId && scope !== STREAM && eventId > getTabRead(scope)) applyRead(scope, eventId);
}

// ---- live updates ----
function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  $('toasts').appendChild(t);
  setTimeout(() => t.remove(), 6000);
}

function setupNotifBtn() {
  $('notif-btn').style.display = ('Notification' in window && Notification.permission !== 'granted') ? '' : 'none';
}

function connect() {
  const es = new EventSource('/api/stream');
  es.onopen = () => {
    $('conn').textContent = 'live';
    loadEvents(); loadWorkers();  // resync anything missed while disconnected
  };
  es.onerror = () => {
    $('conn').textContent = 'disconnected';
    if (es.readyState === EventSource.CLOSED) {  // browser gave up; retry ourselves
      es.close();
      setTimeout(connect, 3000);
    }
  };
  es.onmessage = msg => {
    const e = JSON.parse(msg.data);
    loadEvents(); loadWorkers();
    toast(`${e.event_type}: ${e.title || ''}`);
    if ('Notification' in window && Notification.permission === 'granted')
      new Notification(e.title || e.event_type, { body: e.description || e.event_type });
  };
}

setupNotifBtn();
applyStreamVisibility();
renderTabs();
connect();
// Load everything up front so the first paint doesn't wait on the SSE
// handshake; the stream then keeps it live.
loadFiles();
loadEvents();
loadWorkers();
// Periodic tick: refresh task files (replaces the old explicit refresh) and
// re-tick tab indicators (unread counts + elapsed-time labels).
setInterval(() => { renderTabs(); loadFiles(); }, 15000);
// Escape closes the pane modal.
document.addEventListener('keydown', e => { if (e.key === 'Escape' && !$('pane-modal').hidden) closePaneModal(); });
</script>
